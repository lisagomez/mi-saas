<!-- @dsCard group="Brand" viewport="700x140" subtitle="Metal diamond mark + status badges (no icon set)" name="Mark & badges" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;height:140px;background:var(--bg-0);font-family:var(--font-mono);display:flex;align-items:center;gap:40px;padding:0 32px}
.mark{display:flex;align-items:center;gap:14px}
.dia{width:22px;height:22px;transform:rotate(45deg);background:var(--metal);border-radius:3px;box-shadow:var(--shadow-metal)}
.wm{font-size:18px;letter-spacing:.34em;color:var(--text-steel)}
.vig{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-hi);padding:7px 16px;border-radius:var(--r-pill);
  background:var(--accent-soft);border:1px solid var(--accent-line);box-shadow:var(--glow-accent)}
.der{font-size:13px;letter-spacing:.14em;color:var(--text-dim);text-decoration:line-through;text-decoration-color:var(--risk-hot)}</style></head>
<body>
  <div class="mark"><div class="dia"></div><div class="wm">GRAFO</div></div>
  <div class="vig">vigente</div>
  <div class="der">norma derogada</div>
</body></html>

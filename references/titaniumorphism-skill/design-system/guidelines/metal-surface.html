<!-- @dsCard group="Colors" viewport="700x170" subtitle="Brushed-titanium gradient — the hero material" name="Titanium metal" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-0);font-family:var(--font-mono);display:flex;align-items:center;gap:26px;padding:0 28px;height:170px;box-sizing:border-box}
.bar{flex:1;height:74px;border-radius:var(--r-md);background:var(--metal);box-shadow:var(--shadow-metal)}
.bar.v{background:var(--metal-vert)}
.txt{font-family:var(--font-display);font-weight:800;font-size:60px;letter-spacing:var(--track-mega);
  background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.lab{color:var(--text-steel);font-size:11px;letter-spacing:.06em;margin-top:8px}</style></head>
<body>
  <div style="flex:1"><div class="bar"></div><div class="lab">--metal · surface</div></div>
  <div style="flex:1"><div class="bar v"></div><div class="lab">--metal-vert</div></div>
  <div style="text-align:center"><div class="txt">Grafo</div><div class="lab">metal text (clip)</div></div>
</body></html>

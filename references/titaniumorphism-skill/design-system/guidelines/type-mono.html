<!-- @dsCard group="Type" viewport="700x160" subtitle="JetBrains Mono — kickers, KPI numerals, evidence meta" name="Mono / evidence" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;height:160px;background:var(--surface-page);font-family:var(--font-mono);display:flex;flex-direction:column;justify-content:center;padding:0 30px;gap:14px}
.kick{font-size:18px;letter-spacing:var(--track-kicker);text-transform:uppercase;color:var(--text-steel)}
.stat{font-weight:600;font-size:72px;line-height:1;letter-spacing:-.03em;
  background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.src{font-size:15px;color:var(--text-steel);padding:9px 16px;border-radius:var(--r-sm);background:var(--glass-fill);border:1px solid var(--hairline);align-self:flex-start}
.src b{color:var(--accent-hi);font-weight:500}</style></head>
<body>
  <div class="kick">El valor, en números</div>
  <div style="display:flex;align-items:baseline;gap:24px">
    <div class="stat">&lt;45 s</div><div class="stat">80%</div><div class="stat">≥70%</div>
  </div>
  <div class="src">source_version: <b>LISR-2026.1</b> · vigente al 12·06·2026</div>
</body></html>

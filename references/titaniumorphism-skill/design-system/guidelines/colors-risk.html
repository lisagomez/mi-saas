<!-- @dsCard group="Colors" viewport="700x130" subtitle="Amber — reserved ONLY for the problem / risk beat" name="Risk amber" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-0);font-family:var(--font-mono);display:flex;gap:0}
.sw{flex:1;height:130px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;font-size:11px;letter-spacing:.04em;color:#1a120c}
.sw b{display:block;font-size:12px;margin-bottom:2px}
.note{flex:2;background:var(--bg-1);color:var(--text-steel);justify-content:center}
.note b{color:var(--risk)}</style></head>
<body>
  <div class="sw" style="background:var(--risk)"><b>risk</b>#e0915a</div>
  <div class="sw" style="background:var(--risk-hot)"><b>risk-hot</b>#d96a52</div>
  <div class="sw note"><b>Use sparingly.</b>Amber marks the problem only — tangled graphs, "manual / fragmentado / alto riesgo". Never decorative.</div>
</body></html>

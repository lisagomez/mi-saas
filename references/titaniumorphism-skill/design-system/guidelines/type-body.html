<!-- @dsCard group="Type" viewport="700x170" subtitle="Manrope body + the three-weight emphasis pattern" name="Body / Manrope" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;height:170px;background:var(--surface-page);font-family:var(--font-body);display:flex;flex-direction:column;justify-content:center;padding:0 30px;gap:14px}
.line{font-weight:500;font-size:27px;line-height:1.3;color:var(--text-hi)}
.acc{color:var(--accent)}.met{background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.dim{color:var(--text-dim)}
.lab{font-family:var(--font-mono);font-size:11px;color:var(--text-steel);letter-spacing:.05em}</style></head>
<body>
  <div class="line">El copiloto que <span class="acc">firma con evidencia</span>, <span class="dim">no con suposiciones</span>.</div>
  <div class="line">El sistema entrega la <span class="acc">evidencia</span>; el contador <span class="met">firma el criterio</span>.</div>
  <div class="lab">accent = win · metal = proof · dim = the negation</div>
</body></html>

<!-- @dsCard group="Type" viewport="700x180" subtitle="Sora display — wordmark, scene titles (metal)" name="Display / Sora" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;height:180px;background:var(--surface-page);font-family:var(--font-display);display:flex;flex-direction:column;justify-content:center;padding:0 30px;gap:6px}
.mega{font-weight:800;font-size:84px;line-height:.95;letter-spacing:var(--track-mega);
  background:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.h2{font-weight:600;font-size:34px;letter-spacing:var(--track-tight);color:var(--text-hi)}
.lab{font-family:var(--font-mono);font-size:11px;color:var(--text-steel);letter-spacing:.05em}</style></head>
<body>
  <div class="mega">Grafo</div>
  <div class="h2">Trazabilidad total</div>
  <div class="lab">Sora 800 / 600 · tracking −0.03 to −0.04em</div>
</body></html>

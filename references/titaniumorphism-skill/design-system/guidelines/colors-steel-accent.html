<!-- @dsCard group="Colors" viewport="700x150" subtitle="Steel text scale + the single blue accent" name="Steel & accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-0);font-family:var(--font-mono);display:flex;gap:0}
.sw{flex:1;height:150px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;font-size:11px;letter-spacing:.04em}
.sw b{display:block;font-size:12px;margin-bottom:2px}</style></head>
<body>
  <div class="sw" style="color:var(--text-hi)"><b style="color:var(--text-hi)">text-hi</b>#eef2f6</div>
  <div class="sw" style="color:var(--text)"><b style="color:var(--text)">text</b>#c4cdd5</div>
  <div class="sw" style="color:var(--text-steel)"><b style="color:var(--text-steel)">text-steel</b>#9fb4c9</div>
  <div class="sw" style="color:var(--text-dim)"><b style="color:var(--text-dim)">text-dim</b>#6f7c89</div>
  <div class="sw" style="background:var(--accent);color:#06203a"><b style="color:#06203a">accent</b>#5fa8e6</div>
  <div class="sw" style="background:var(--accent-hi);color:#06203a"><b style="color:#06203a">accent-hi</b>#9ed0ff</div>
</body></html>

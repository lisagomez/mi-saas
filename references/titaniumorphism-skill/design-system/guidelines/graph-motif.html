<!-- @dsCard group="Brand" viewport="700x210" subtitle="The graph motif — metal nodes + drawing accent edges" name="Graph motif" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;height:210px;background:var(--surface-page);font-family:var(--font-body);position:relative;overflow:hidden}
.node{position:absolute;top:90px;width:64px;height:64px;border-radius:50%;background:var(--metal);padding:3px;box-sizing:border-box;
  box-shadow:var(--shadow-metal);transform:translate(-50%,-50%)}
.node>i{display:block;width:100%;height:100%;border-radius:50%;background:var(--metal-face);
  border:1px solid var(--hairline);display:flex;align-items:center;justify-content:center}
.node>i>s{width:26px;height:26px;border-radius:50%;background:var(--accent);box-shadow:var(--glow-accent-strong)}
.lab{position:absolute;top:138px;transform:translateX(-50%);font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--text-hi)}
.k{position:absolute;left:28px;top:22px;font-family:var(--font-mono);font-size:12px;letter-spacing:var(--track-kicker);color:var(--text-steel)}</style></head>
<body>
  <div class="k">EL DIFERENCIADOR</div>
  <svg width="700" height="210" style="position:absolute;inset:0">
    <line x1="170" y1="105" x2="350" y2="105" stroke="var(--accent)" stroke-width="4" style="filter:drop-shadow(0 0 7px var(--accent))"/>
    <line x1="350" y1="105" x2="530" y2="105" stroke="var(--accent)" stroke-width="4" stroke-dasharray="180" stroke-dashoffset="60" style="filter:drop-shadow(0 0 7px var(--accent))"/>
    <circle cx="455" cy="105" r="6.5" fill="#fff" style="filter:drop-shadow(0 0 9px var(--accent))"/>
  </svg>
  <div class="node" style="left:170px"><i><s></s></i></div>
  <div class="node" style="left:350px;width:80px;height:80px"><i><s></s></i></div>
  <div class="node" style="left:530px"><i><s></s></i></div>
  <div class="lab" style="left:170px">Gasto</div>
  <div class="lab" style="left:350px">Art. 28 LISR</div>
  <div class="lab" style="left:530px">Criterio SAT</div>
</body></html>

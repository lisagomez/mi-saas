<!-- @dsCard group="Slides" viewport="1280x720" subtitle="Impact — three metal KPIs with accent underlines" name="Stat slide" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .slide{position:relative;width:1280px;height:720px;background:var(--surface-page);overflow:hidden;font-family:var(--font-body)}
  .brushed{position:absolute;inset:0;opacity:.05;background:var(--brushed)}
  .vig{position:absolute;inset:0;background:var(--vignette);pointer-events:none}
  .chrome-l{position:absolute;left:42px;top:36px;display:flex;align-items:center;gap:10px;opacity:.6}
  .dia{width:11px;height:11px;transform:rotate(45deg);background:var(--metal);border-radius:2px}
  .wm{font-family:var(--font-mono);font-size:12px;letter-spacing:.34em;color:var(--text-steel);text-transform:uppercase}
  .chrome-r{position:absolute;right:42px;top:38px;font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;color:var(--text-dim);text-transform:uppercase}
  .bar{position:absolute;left:0;bottom:0;height:2px;width:74%;background:linear-gradient(90deg,var(--accent),var(--accent-hi));box-shadow:var(--glow-accent)}
  .kick{position:absolute;left:50%;top:108px;transform:translateX(-50%);font-family:var(--font-mono);font-size:17px;letter-spacing:var(--track-kicker);text-transform:uppercase;color:var(--text-steel)}
  .grid{position:absolute;left:50%;top:50%;transform:translate(-50%,-44%);display:flex;gap:60px}
  .kpi{width:320px;text-align:center}
  .v{font-family:var(--font-mono);font-weight:600;font-size:104px;line-height:1;letter-spacing:-.03em;
    background-image:var(--metal);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;filter:drop-shadow(0 12px 30px rgba(0,0,0,.5))}
  .u{height:3px;width:64%;margin:18px auto 0;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent-hi));box-shadow:var(--glow-accent-strong)}
  .l{margin-top:24px;font-family:var(--font-display);font-weight:600;font-size:25px;color:var(--text-hi)}
  .n{margin-top:8px;font-size:16px;color:var(--text-steel)}
</style></head>
<body>
  <div class="slide">
    <div class="brushed"></div>
    <div class="chrome-l"><div class="dia"></div><div class="wm">Grafo</div></div>
    <div class="chrome-r">Inteligencia fiscal · grafo</div>
    <div class="kick">El valor, en números · objetivo V1</div>
    <div class="grid">
      <div class="kpi"><div class="v">&lt;45 s</div><div class="u"></div><div class="l">Dictamen con ruta legal</div><div class="n">−90% vs. el proceso manual</div></div>
      <div class="kpi"><div class="v">80%</div><div class="u"></div><div class="l">Cobertura</div><div class="n">conceptos de gasto recurrentes (PM)</div></div>
      <div class="kpi"><div class="v">≥70%</div><div class="u"></div><div class="l">Adopción</div><div class="n">consultas → Reporte de Sustento</div></div>
    </div>
    <div class="vig"></div>
    <div class="bar"></div>
  </div>
</body></html>
